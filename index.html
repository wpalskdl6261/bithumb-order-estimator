<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bithumb Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 pt-20">

    <!-- Top Bar -->
    <header class="fixed top-0 left-0 w-full bg-[#0f141a]/60 backdrop-blur-xl z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <span class="material-icons text-[#f37321]">monitoring</span>
            <span class="text-lg font-black text-[#f37321] tracking-tight">Bithumb Estimator</span>
        </div>
        <span class="text-slate-400 text-xs font-bold">v1.0.4</span>
    </header>

    <div class="max-w-md mx-auto">
        
        <!-- Header Section -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">체결대시보드 V2</h1>
            <p class="text-slate-400 text-sm leading-relaxed px-4">추적 덱에 추가한 이후의 실제 체결 경향을 분석해 남은 대기 시간을 계산합니다.</p>
        </div>

        <!-- Add Tracker Form -->
        <div class="glass-panel rounded-3xl p-6 mb-8 orange-glow">
            <h2 class="flex items-center gap-2 text-white font-bold text-lg mb-6">
                <span class="material-icons text-[#f37321]">add_circle</span>
                신규 체결 추적 추가
            </h2>

            <div class="space-y-6">
                <!-- Coin Selection -->
                <div>
                    <label class="block text-slate-400 text-xs font-bold uppercase tracking-wider mb-3">대상 코인 선택</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="radio-btn relative cursor-pointer">
                            <input type="radio" name="coin" value="NFT" checked class="absolute opacity-0">
                            <span class="flex items-center justify-center p-3 rounded-xl font-bold text-sm transition-all">APENFT (NFT)</span>
                        </label>
                        <label class="radio-btn relative cursor-pointer">
                            <input type="radio" name="coin" value="BTT" class="absolute opacity-0">
                            <span class="flex items-center justify-center p-3 rounded-xl font-bold text-sm transition-all text-slate-500">비트토렌트 (BTT)</span>
                        </label>
                    </div>
                </div>

                <!-- Target Price -->
                <div>
                    <label class="block text-slate-400 text-xs font-bold uppercase tracking-wider mb-3">현재 기준 주문 가격 (KRW)</label>
                    <div class="relative">
                        <input type="number" id="targetPrice" value="0.0004" step="0.0001" class="w-full p-4 rounded-xl font-mono text-xl text-[#f37321] font-bold">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">₩</span>
                    </div>
                </div>

                <!-- Input Type -->
                <div>
                    <label class="block text-slate-400 text-xs font-bold uppercase tracking-wider mb-3">대기 물량 입력 기준</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="radio-btn relative cursor-pointer">
                            <input type="radio" name="input_type" value="KRW" checked class="absolute opacity-0">
                            <span class="flex items-center justify-center p-3 rounded-xl font-bold text-sm transition-all">원화(₩)</span>
                        </label>
                        <label class="radio-btn relative cursor-pointer">
                            <input type="radio" name="input_type" value="COIN" class="absolute opacity-0">
                            <span class="flex items-center justify-center p-3 rounded-xl font-bold text-sm transition-all text-slate-500">코인개수</span>
                        </label>
                    </div>
                </div>

                <!-- Amount -->
                <div>
                    <label id="amount-label" class="block text-slate-400 text-xs font-bold uppercase tracking-wider mb-3">내 앞 대기 원화</label>
                    <div class="relative">
                        <input type="number" id="targetAmount" placeholder="예: 10,000,000" class="w-full p-4 rounded-xl font-mono text-lg">
                        <span id="amount-postfix" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">원</span>
                    </div>
                    <p id="sync-text" class="text-[#f37321] text-sm font-bold mt-2">= 대기 중...</p>
                </div>

                <button id="addTrackerBtn" class="btn-primary w-full py-5 rounded-2xl text-white font-black text-lg flex items-center justify-center gap-2 shadow-xl">
                    추적 덱에 추가하기
                </button>
                <p id="error-msg" class="text-center text-sm text-red-400 font-semibold min-h-[20px]"></p>

                <p class="text-center text-[10px] text-slate-500 font-medium">
                    <span class="material-icons text-[12px] align-middle">info</span>
                    덱 추가 이후 누적 속도와 최근 속도를 함께 비교해 예상 체결 시간을 계산합니다.
                </p>
            </div>
        </div>

        <!-- Live Tracker List Header -->
        <div class="flex items-center justify-between mb-6 px-2">
            <h3 class="flex items-center gap-2 text-white font-bold text-lg">
                <span class="material-icons text-[#f37321]">sensors</span>
                라이브 체결 추적 현황
            </h3>
            <span class="bg-[#181c23] border border-white/5 text-slate-400 text-[10px] font-black px-3 py-1.5 rounded-full flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#f37321] animate-pulse"></span>
                <span id="active-count">0</span> ACTIVE
            </span>
        </div>

        <!-- Empty State -->
        <div id="tracker-list" class="space-y-4">
            <div class="border-2 border-dashed border-white/5 rounded-3xl p-12 text-center">
                <div class="w-16 h-16 bg-[#181c23] rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <span class="material-icons text-slate-600 text-3xl">hourglass_empty</span>
                </div>
                <h4 class="text-white font-bold text-xl mb-2">진행 중인 추적이 없습니다</h4>
                <p class="text-slate-500 text-sm leading-relaxed px-4">시작하려면 상단 양식에서 코인과 물량을 입력하여 추적을 시작하세요.</p>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
